name: Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.git/*" | xargs python -m py_compile
          echo "✅ Python syntax check passed"

      - name: Validate requirements.txt
        run: |
          pip check
          echo "✅ Dependencies validated successfully"

  deploy:
    name: Deploy to Streamlit Cloud
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify deployment triggered
        run: |
          echo "🚀 Deployment to Streamlit Cloud triggered!"
          echo "Streamlit Cloud auto-deploys on push to main branch."
          echo "App URL: https://ai-scrum-master-dynamic.streamlit.app"
          echo "✅ Production deployment complete"
